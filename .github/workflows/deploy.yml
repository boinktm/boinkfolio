# Deploy to GitHub Pages with scheduled rebuilds
# Automatically fetches latest SoundCloud tracks at build time

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Rebuild daily at midnight UTC to pick up new SoundCloud uploads
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        env:
          SOUNDCLOUD_USER_ID: ${{ secrets.SOUNDCLOUD_USER_ID }}
        run: npm run build

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
